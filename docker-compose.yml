version: '3.5'

services:
  docker-symfony-web:
    container_name: docker-symfony-web
    build:
      context: ./docker/nginx
      args:
        UID: $U_ID
    ports:
      - 300:80
    volumes:
      - ./public:/appdata/www/public
    networks:
      - docker-symfony-network
    depends_on:
      - docker-symfony-be

  docker-symfony-be:
    container_name: docker-symfony-be
    build:
      context: ./docker/php
      args:
        UID: $U_ID
    environment:
      PHP_IDE_CONFIG: serverName=Docker
    volumes:
      - ./:/appdata/www
      - ~/.ssh/id_rsa:/home/appuser/.ssh/id_rsa
    networks:
      - docker-symfony-network
    depends_on:
      - docker-symfony-db

  docker-symfony-db:
    container_name: docker-symfony-db
    image: mysql:8.0
    ports:
      - 40000:3306
    environment:
      MYSQL_DATABASE: docker_symfony_database
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    command: mysqld --sql_mode="STRICT_ALL_TABLES,NO_ENGINE_SUBSTITUTION"
    volumes:
      - docker-symfony-database-data:/var/lib/mysql
    networks:
      - docker-symfony-network

  docker-symfony-dbClient:
    container_name: docker-symfony-dbClient
    image: mysql:8.0
    ports:
      - 40001:3306
    environment:
      MYSQL_DATABASE: docker_symfony_databaseClient
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    command: mysqld --sql_mode="STRICT_ALL_TABLES,NO_ENGINE_SUBSTITUTION"
    volumes:
      - docker-symfony-databaseClient-data:/var/lib/mysql
    networks:
      - docker-symfony-network

  docker-symfony-dbFosforo:
    container_name: docker-symfony-dbFosforo
    image: mysql:8.0
    ports:
      - 40002:3306
    environment:
      MYSQL_DATABASE: docker_symfony_databaseFosforo
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    command: mysqld --sql_mode="STRICT_ALL_TABLES,NO_ENGINE_SUBSTITUTION"
    volumes:
      - docker-symfony-databaseFosforo-data:/var/lib/mysql
    networks:
      - docker-symfony-network
  docker-symfony-dbBarrilon:
    container_name: docker-symfony-dbBarrilon
    image: mysql:8.0
    ports:
      - 40003:3306
    environment:
      MYSQL_DATABASE: docker_symfony_databaseBarrilon
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    command: mysqld --sql_mode="STRICT_ALL_TABLES,NO_ENGINE_SUBSTITUTION"
    volumes:
      - docker-symfony-databaseBarrilon-data:/var/lib/mysql
    networks:
      - docker-symfony-network
volumes:
  docker-symfony-database-data:
  docker-symfony-databaseClient-data:
  docker-symfony-databaseFosforo-data:
  docker-symfony-databaseBarrilon-data:

networks:
  docker-symfony-network:
    external: true
